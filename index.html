<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yard | Menù</title>
    <!-- Import Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #39FF14;
            --text: #ffffff;
            --glow: 0 0 15px rgba(57, 255, 20, 0.3);
            --collapse-duration: 0.35s;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(ellipse 700px 500px at 15% -5%, rgba(57, 255, 20, 0.07), transparent 60%),
                radial-gradient(ellipse 600px 500px at 90% 110%, rgba(57, 255, 20, 0.05), transparent 60%);
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        header { margin: 40px 0; text-align: center; }
        
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        .logo-img {
            max-width: 180px;
            max-height: 80px;
            object-fit: contain;
        }

        @media (max-width: 560px) {
            .logo-img { max-width: 234px; max-height: 104px; }
        }

        h1 { 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 900; 
            font-size: 2.5rem; 
            letter-spacing: 4px; 
            color: var(--text); 
            margin: 10px 0; 
            text-shadow: var(--glow); 
        }

        .menu-wrapper { width: 100%; max-width: 500px; flex-grow: 1; }

        .lang-notice {
            display: none;
            text-align: center;
            font-size: 0.8rem;
            color: #ff9f0a;
            background: rgba(255, 159, 10, 0.08);
            border: 1px solid rgba(255, 159, 10, 0.25);
            border-radius: 12px;
            padding: 8px 14px;
            margin: 0 0 15px;
            max-width: 500px;
        }

        /* --- Selettore lingua: floating button a ventaglio --- */
        .lang-fab {
            position: fixed;
            right: 20px;
            bottom: calc(36px + env(safe-area-inset-bottom, 0px));
            z-index: 50;
        }
        .lang-fab.loading { opacity: 0.6; pointer-events: none; }

        /* Da qui in su la card del menù (max-width: 500px) resta centrata con
           margini laterali ampi: ancoriamo il FAB al bordo della card invece
           che all'angolo della finestra, altrimenti su schermi larghi
           sembrerebbe perso lontano dal contenuto. */
        @media (min-width: 561px) {
            .lang-fab {
                right: calc(50vw - 250px - 8px);
                bottom: 28px;
            }
        }

        .lang-fab-main {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            padding: 3px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--accent);
            box-shadow: var(--glow), 0 8px 18px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            position: relative;
            z-index: 2;
            animation: fab-pulse 3s ease-in-out infinite;
        }
        @keyframes fab-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(57, 255, 20, 0.25), 0 8px 18px rgba(0, 0, 0, 0.5); }
            50% { box-shadow: 0 0 18px rgba(57, 255, 20, 0.5), 0 8px 18px rgba(0, 0, 0, 0.5); }
        }

        .lang-fan {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 56px;
            height: 56px;
            pointer-events: none;
        }

        .lang-fan-btn {
            position: absolute;
            right: 6px;
            bottom: 6px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            padding: 2px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--border-color);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.45);
            cursor: pointer;
            opacity: 0;
            transform: translate(0, 0) scale(0.4);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease, border-color 0.2s ease;
        }
        .lang-fan-btn:hover { border-color: var(--accent); }

        .lang-fab.open .lang-fan-btn {
            opacity: 1;
            pointer-events: auto;
        }
        .lang-fab.open .lang-fan-btn:nth-child(1) { transform: translate(-4px, -68px) scale(1); transition-delay: 0ms; }
        .lang-fab.open .lang-fan-btn:nth-child(2) { transform: translate(-46px, -54px) scale(1); transition-delay: 40ms; }
        .lang-fab.open .lang-fan-btn:nth-child(3) { transform: translate(-66px, -16px) scale(1); transition-delay: 80ms; }
        .lang-fab.open .lang-fan-btn:nth-child(4) { transform: translate(-70px, 26px) scale(1); transition-delay: 120ms; }

        .flag-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .flag-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--accent);
        }
        
        .category { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            margin-bottom: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.07);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }
        
        .cat-header { 
            padding: 20px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 600; 
            color: var(--accent); 
            transition: background 0.3s;
            position: sticky;
            top: 0;
            z-index: 2;
            background: linear-gradient(180deg, rgba(26, 26, 26, 0.92), rgba(16, 16, 16, 0.88));
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        }

        .category:has(.items.active) {
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 0 0 1px rgba(57, 255, 20, 0.15);
        }
        
        .cat-header:hover { background: rgba(57, 255, 20, 0.03); }

        .items { 
            padding: 0 20px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height var(--collapse-duration) cubic-bezier(0.25, 1, 0.5, 1), opacity 0.25s ease, padding var(--collapse-duration) ease;
        }
        
        .items.active { 
            padding: 0 20px 20px 20px;
            opacity: 1;
        }
        
        .row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            font-size: 0.95rem; 
            border-bottom: 1px dashed rgba(255,255,255,0.08); 
        }
        .row:last-child { border-bottom: none; }
        
        .price { font-weight: 700; color: #fff; letter-spacing: 0.2px; }

        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid var(--accent); 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 1s linear infinite; 
            margin: 30px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-msg { 
            color: #ff453a; 
            text-align: center; 
            padding: 20px; 
            background: rgba(255,69,58,0.08); 
            border-radius: 16px; 
            border: 1px solid rgba(255,69,58,0.2); 
            margin-top: 20px;
        }

        footer { 
            margin-top: auto; 
            padding-top: 50px;
            padding-bottom: 20px;
            text-align: center; 
            font-size: 0.8rem; 
            color: #86868b; 
            width: 100%;
        }
        .insta-link { color: var(--accent); text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.webp" class="logo-img" alt="YARD Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<h1>MENÙ</h1>';">
        </div>
    </header>

    <div class="lang-notice" id="lang-notice"></div>

    <div class="menu-wrapper" id="menu-container">
        <!-- Loader iniziale -->
        <div id="loader-wrapper">
            <div class="loader"></div>
            <p style="text-align:center; color: var(--text); opacity: 0.7; font-size: 14px;" id="loader-text">Caricamento menù...</p>
        </div>
    </div>

    <div class="lang-fab" id="lang-fab">
        <button class="lang-fab-main" id="lang-fab-main" onclick="toggleLangFan()" aria-label="Cambia lingua" aria-expanded="false"></button>
        <div class="lang-fan" id="lang-fan"></div>
    </div>

    <footer>
        <p>YARD | Chiosco del parco</p>
        <p>Parco di San Gavino, Porto Torres (SS)</p>
        <a href="https://www.instagram.com/yardsangavino/" class="insta-link" target="_blank">Instagram 📷</a>
        <p style="margin-top:15px; opacity: 0.5;">Designed by Matteo Masia</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://germswzsfsxxlawqxsgt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa';
        
        // CORREZIONE FONDAMENTALE: Usiamo 'sb' invece di 'supabase' per evitare conflitti di nome
        // con l'oggetto globale supabase iniettato dallo script CDN.
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Dati grezzi (italiano, fonte di verità) e stato lingua corrente
        let cats = [];
        let prods = [];
        let currentLang = 'it';
        try { currentLang = localStorage.getItem('yard_lang') || 'it'; } catch (e) { /* storage non disponibile, va bene IT di default */ }
        let nameOverrides = { categories: {}, products: {} };

        const LANGS = [
            { code: 'it', flag: 'it', label: 'Italiano' },
            { code: 'en', flag: 'gb', label: 'English' },
            { code: 'es', flag: 'es', label: 'Español' },
            { code: 'fr', flag: 'fr', label: 'Français' },
            { code: 'de', flag: 'de', label: 'Deutsch' }
        ];

        function flagUrl(flagCode) {
            return `https://flagcdn.com/${flagCode}.svg`;
        }

        function renderLangFab() {
            const main = document.getElementById('lang-fab-main');
            const fan = document.getElementById('lang-fan');
            if (!main || !fan) return;

            const current = LANGS.find(l => l.code === currentLang) || LANGS[0];
            main.innerHTML = `<img class="flag-img" src="${flagUrl(current.flag)}" alt="${current.label}" onerror="this.outerHTML='&lt;span class=&quot;flag-fallback&quot;&gt;${current.code.toUpperCase()}&lt;/span&gt;'">`;

            const others = LANGS.filter(l => l.code !== currentLang);
            fan.innerHTML = others.map(l =>
                `<button class="lang-fan-btn" onclick="selectLanguage('${l.code}')" aria-label="${l.label}">
                    <img class="flag-img" src="${flagUrl(l.flag)}" alt="${l.label}" onerror="this.outerHTML='&lt;span class=&quot;flag-fallback&quot;&gt;${l.code.toUpperCase()}&lt;/span&gt;'">
                </button>`
            ).join('');
        }

        window.toggleLangFan = function() {
            const fab = document.getElementById('lang-fab');
            const isOpen = fab.classList.toggle('open');
            document.getElementById('lang-fab-main').setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        };

        function closeLangFan() {
            const fab = document.getElementById('lang-fab');
            fab.classList.remove('open');
            document.getElementById('lang-fab-main').setAttribute('aria-expanded', 'false');
        }

        // Chiude il ventaglio se l'utente tocca/clicca fuori dal FAB
        document.addEventListener('click', (e) => {
            const fab = document.getElementById('lang-fab');
            if (fab && fab.classList.contains('open') && !fab.contains(e.target)) {
                closeLangFan();
            }
        });

        window.selectLanguage = function(lang) {
            closeLangFan();
            setLanguage(lang);
        };

        async function loadMenu() {
            const container = document.getElementById('menu-container');
            const loader = document.getElementById('loader-wrapper');
            const loaderText = document.getElementById('loader-text');
            
            try {
                console.log("Inizio fetching dati da Supabase...");
                loaderText.textContent = "Caricamento categorie...";

                // Leggiamo solo categorie visibili ordinate
                const { data: catData, error: catErr } = await sb
                    .from('categories')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (catErr) {
                    console.error("Errore Categorie:", catErr);
                    throw new Error("Errore Categorie: " + catErr.message);
                }

                loaderText.textContent = "Caricamento prodotti...";

                // Leggiamo solo prodotti visibili ordinati per order_index
                const { data: prodData, error: prodErr } = await sb
                    .from('products')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (prodErr) {
                    console.error("Errore Prodotti:", prodErr);
                    throw new Error("Errore Prodotti: " + prodErr.message);
                }

                cats = catData || [];
                prods = prodData || [];

                // Nascondiamo il loader
                loader.style.display = 'none';

                renderLangFab();

                if (currentLang !== 'it') {
                    // L'utente aveva già scelto una lingua in una visita precedente
                    await applyLanguage(currentLang);
                } else {
                    renderMenu();
                }

            } catch (error) {
                console.error("Errore fatale in loadMenu:", error);
                if (loader) loader.style.display = 'none';
                // Mostra un errore rosso in pagina invece di restare bloccato sul loader
                container.innerHTML = `
                    <div class="error-msg">
                        <strong>Ops! Impossibile caricare il menù.</strong><br>
                        <small style="opacity:0.8; display:block; margin-top:10px;">${error.message}</small>
                    </div>`;
            }
        }

        // Disegna il menù usando i dati grezzi + eventuali traduzioni correnti.
        // La struttura (ordine, raggruppamento per categoria) viene sempre
        // dai dati italiani: la lingua sostituisce solo i nomi visualizzati.
        function renderMenu() {
            const container = document.getElementById('menu-container');

            if (!cats || cats.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.7; padding: 20px;">Nessuna categoria visibile al momento.</p>';
                return;
            }

            let menuHTML = '';

            cats.forEach(cat => {
                const catProducts = prods ? prods.filter(p => p.category_id === cat.id) : [];
                if (catProducts.length === 0) return;

                const catName = currentLang !== 'it' && nameOverrides.categories[cat.id]
                    ? nameOverrides.categories[cat.id]
                    : cat.name;

                let itemsHTML = catProducts.map(p => {
                    const prodName = currentLang !== 'it' && nameOverrides.products[p.id]
                        ? nameOverrides.products[p.id]
                        : p.name;
                    return `
                        <div class="row">
                            <span>${prodName}</span>
                            <span class="price">€${parseFloat(p.price).toFixed(2)}</span>
                        </div>
                    `;
                }).join('');

                menuHTML += `
                    <div class="category">
                        <div class="cat-header" onclick="toggleCategory(this)">
                            ${catName.toUpperCase()} <span class="arrow">▼</span>
                        </div>
                        <div class="items">
                            ${itemsHTML}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = menuHTML || '<p style="text-align:center; opacity:0.7;">Nessun prodotto visibile al momento.</p>';
        }

        function showLangNotice(message) {
            const el = document.getElementById('lang-notice');
            if (!el) return;
            if (!message) { el.style.display = 'none'; el.textContent = ''; return; }
            el.textContent = message;
            el.style.display = 'block';
        }

        // Applica una lingua: per IT è istantaneo (nessuna chiamata di rete).
        // Per le altre lingue interroga /api/translate-menu, che a sua volta
        // legge dalla cache su Supabase e chiama Gemini solo per le voci
        // mancanti. In caso di errore, fallback automatico sull'italiano.
        async function applyLanguage(lang) {
            if (lang === 'it') {
                currentLang = 'it';
                nameOverrides = { categories: {}, products: {} };
                renderLangFab();
                renderMenu();
                showLangNotice(null);
                return;
            }

            const fabEl = document.getElementById('lang-fab');
            if (fabEl) fabEl.classList.add('loading');

            try {
                const res = await fetch(`/api/translate-menu?lang=${lang}`);
                if (!res.ok) throw new Error('Servizio di traduzione non disponibile (' + res.status + ')');
                const data = await res.json();

                currentLang = lang;
                nameOverrides = { categories: data.categories || {}, products: data.products || {} };
                renderLangFab();
                renderMenu();
                showLangNotice(data.partial ? 'Alcune voci non sono ancora tradotte: verranno aggiornate a breve.' : null);
            } catch (err) {
                console.error('Errore traduzione:', err);
                currentLang = 'it';
                nameOverrides = { categories: {}, products: {} };
                renderLangFab();
                renderMenu();
                showLangNotice('Traduzione non disponibile al momento: mostro il menù in italiano.');
            } finally {
                if (fabEl) fabEl.classList.remove('loading');
            }
        }

        window.setLanguage = function(lang) {
            if (lang === currentLang) return;
            try { localStorage.setItem('yard_lang', lang); } catch (e) { /* storage non disponibile, non blocca la UX */ }
            applyLanguage(lang);
        };

        window.toggleCategory = function(element) {
            const itemsContainer = element.nextElementSibling;
            const isActive = itemsContainer.classList.contains('active');
            const allCategories = Array.from(document.querySelectorAll('.category'));
            const clickedIndex = allCategories.indexOf(element.parentElement);

            // Durata della transizione, letta dalla variabile CSS per restare sempre sincronizzata
            const durationStr = getComputedStyle(document.documentElement).getPropertyValue('--collapse-duration').trim();
            const collapseDuration = parseFloat(durationStr) * 1000 || 350;

            let mustWaitForCloseAbove = false;

            // Chiude in modo animato tutte le altre categorie aperte
            document.querySelectorAll('.items.active').forEach(otherItems => {
                if (otherItems === itemsContainer) return;

                const otherCategoryDiv = otherItems.closest('.category');
                const otherIndex = allCategories.indexOf(otherCategoryDiv);
                if (otherIndex < clickedIndex) mustWaitForCloseAbove = true;

                // Fissa l'altezza attuale esplicitamente prima di animare verso 0
                otherItems.style.maxHeight = otherItems.scrollHeight + 'px';
                void otherItems.offsetHeight; // forza il reflow
                otherItems.style.maxHeight = '0px';
                otherItems.classList.remove('active');

                const otherArrow = otherCategoryDiv.querySelector('.arrow');
                if (otherArrow) otherArrow.textContent = '▼';
            });

            if (isActive) {
                // L'utente ha chiuso la categoria che era aperta: nessuno scroll
                itemsContainer.style.maxHeight = '0px';
                itemsContainer.classList.remove('active');
                element.querySelector('.arrow').textContent = '▼';
                return;
            }

            // Apre la categoria cliccata
            itemsContainer.classList.add('active');
            itemsContainer.style.maxHeight = itemsContainer.scrollHeight + 'px';
            element.querySelector('.arrow').textContent = '▲';

            const scrollHeaderIntoView = () => {
                const headerTop = element.getBoundingClientRect().top + window.scrollY;
                window.scrollTo({ top: headerTop, behavior: 'smooth' });
            };

            if (mustWaitForCloseAbove) {
                // Aspetta che la chiusura delle categorie sopra finisca, altrimenti
                // la posizione dell'header cambierebbe mentre lo scroll è già in corso
                setTimeout(scrollHeaderIntoView, collapseDuration);
            } else {
                requestAnimationFrame(scrollHeaderIntoView);
            }
        };

        // Avvia il caricamento appena lo script viene letto
        loadMenu();
    </script>
</body>
</html>
