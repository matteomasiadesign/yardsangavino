<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yard | Menù</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #39FF14;
            --text: #ffffff;
            --glow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        header { margin: 40px 0; text-align: center; }
        h1 { font-family: 'Courier New', Courier, monospace; font-weight: 900; font-size: 2.5rem; letter-spacing: 4px; color: var(--text); margin: 10px 0; text-shadow: var(--glow); }

        .menu-wrapper { width: 100%; max-width: 500px; }
        .category { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--border-color); border-radius: 20px; margin-bottom: 15px; }
        .cat-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: var(--accent); }
        .items { padding: 0 20px 20px 20px; display: none; }
        .items.active { display: block; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row:last-child { border-bottom: none; }
        
        /* Loader styling */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #ff453a; text-align: center; padding: 20px; background: rgba(255,69,58,0.1); border-radius: 10px; border: 1px solid rgba(255,69,58,0.3); }

        footer { margin-top: 50px; text-align: center; font-size: 0.8rem; color: #86868b; }
        .insta-link { color: var(--accent); text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MENÙ</h1>
    </header>

    <div class="menu-wrapper" id="menu-container">
        <div class="loader"></div>
        <p style="text-align:center; color: var(--text); opacity: 0.7; font-size: 14px;">Caricamento menù...</p>
    </div>

    <footer>
        <p>YARD | Chiosco del parco</p>
        <p>Parco di San Gavino, Porto Torres (SS)</p>
        <a href="https://www.instagram.com/yardsangavino/" class="insta-link" target="_blank">Instagram 📷</a>
        <p style="margin-top:15px">Designed by Matteo Masia</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://germswzsfsxxlawqxsgt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadMenu() {
            const container = document.getElementById('menu-container');
            
            try {
                // Recupera categorie visibili
                const { data: cats, error: catErr } = await supabase
                    .from('categories')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (catErr) throw new Error("Errore nel caricamento delle categorie.");

                // Recupera prodotti visibili
                const { data: prods, error: prodErr } = await supabase
                    .from('products')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (prodErr) throw new Error("Errore nel caricamento dei prodotti.");

                container.innerHTML = ''; // Rimuove il loader

                if (!cats || cats.length === 0) {
                    container.innerHTML = '<p style="text-align:center; opacity:0.7;">Nessuna voce presente nel menù al momento.</p>';
                    return;
                }

                cats.forEach(cat => {
                    // Filtra i prodotti per questa categoria
                    const catProducts = prods.filter(p => p.category_id === cat.id);
                    
                    // Se la categoria non ha prodotti visibili, saltiamo
                    if (catProducts.length === 0) return;

                    const div = document.createElement('div');
                    div.className = 'category';
                    div.innerHTML = `
                        <div class="cat-header">${cat.name.toUpperCase()} <span>▼</span></div>
                        <div class="items">
                            ${catProducts.map(p => `
                                <div class="row">
                                    <span>${p.name}</span>
                                    <span>€${parseFloat(p.price).toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    
                    // Logica per l'apertura a tendina (accordion)
                    div.querySelector('.cat-header').onclick = function() {
                        const itemsContainer = this.nextElementSibling;
                        const isAlreadyActive = itemsContainer.classList.contains('active');
                        
                        // Chiudi tutti prima di aprire
                        document.querySelectorAll('.items').forEach(i => i.classList.remove('active'));
                        document.querySelectorAll('.cat-header span').forEach(span => span.textContent = '▼');

                        if (!isAlreadyActive) {
                            itemsContainer.classList.add('active');
                            this.querySelector('span').textContent = '▲';
                            
                            // Scroll morbido per centrare la categoria aperta
                            setTimeout(() => {
                                this.parentElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 100);
                        }
                    };
                    container.appendChild(div);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="error-msg">Ops! Si è verificato un errore nel caricamento del menù. Riprova più tardi.</div>`;
            }
        }

        // Avvia il caricamento appena la pagina è pronta
        loadMenu();
    </script>
</body>
</html>
