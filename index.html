<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yard | Menù</title>
    <!-- Import Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #39FF14;
            --text: #ffffff;
            --glow: 0 0 15px rgba(57, 255, 20, 0.3);
            --collapse-duration: 0.35s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        header { margin: 40px 0; text-align: center; }
        
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        .logo-img {
            max-width: 180px;
            max-height: 80px;
            object-fit: contain;
        }

        h1 { 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 900; 
            font-size: 2.5rem; 
            letter-spacing: 4px; 
            color: var(--text); 
            margin: 10px 0; 
            text-shadow: var(--glow); 
        }

        .menu-wrapper { width: 100%; max-width: 500px; flex-grow: 1; }

        .lang-switcher {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 0 0 20px;
            transition: opacity 0.2s ease;
        }
        .lang-switcher.loading { opacity: 0.5; pointer-events: none; }

        .lang-btn {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }
        .lang-btn:hover { border-color: var(--accent); }
        .lang-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .lang-notice {
            display: none;
            text-align: center;
            font-size: 0.8rem;
            color: #ff9f0a;
            background: rgba(255, 159, 10, 0.08);
            border: 1px solid rgba(255, 159, 10, 0.25);
            border-radius: 12px;
            padding: 8px 14px;
            margin: 0 0 15px;
            max-width: 500px;
        }
        
        .category { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            margin-bottom: 15px; 
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .cat-header { 
            padding: 20px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 600; 
            color: var(--accent); 
            transition: background 0.3s;
            position: sticky;
            top: 0;
            z-index: 2;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
        }
        
        .cat-header:hover { background: rgba(57, 255, 20, 0.03); }

        .items { 
            padding: 0 20px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height var(--collapse-duration) cubic-bezier(0.25, 1, 0.5, 1), opacity 0.25s ease, padding var(--collapse-duration) ease;
        }
        
        .items.active { 
            padding: 0 20px 20px 20px;
            opacity: 1;
        }
        
        .row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            font-size: 0.95rem; 
            border-bottom: 1px dashed rgba(255,255,255,0.08); 
        }
        .row:last-child { border-bottom: none; }
        
        .price { font-weight: 500; color: #ddd; }

        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid var(--accent); 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 1s linear infinite; 
            margin: 30px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-msg { 
            color: #ff453a; 
            text-align: center; 
            padding: 20px; 
            background: rgba(255,69,58,0.08); 
            border-radius: 16px; 
            border: 1px solid rgba(255,69,58,0.2); 
            margin-top: 20px;
        }

        footer { 
            margin-top: auto; 
            padding-top: 50px;
            padding-bottom: 20px;
            text-align: center; 
            font-size: 0.8rem; 
            color: #86868b; 
            width: 100%;
        }
        .insta-link { color: var(--accent); text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.webp" class="logo-img" alt="YARD Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<h1>MENÙ</h1>';">
        </div>
    </header>

    <div class="lang-switcher" id="lang-switcher"></div>
    <div class="lang-notice" id="lang-notice"></div>

    <div class="menu-wrapper" id="menu-container">
        <!-- Loader iniziale -->
        <div id="loader-wrapper">
            <div class="loader"></div>
            <p style="text-align:center; color: var(--text); opacity: 0.7; font-size: 14px;" id="loader-text">Caricamento menù...</p>
        </div>
    </div>

    <footer>
        <p>YARD | Chiosco del parco</p>
        <p>Parco di San Gavino, Porto Torres (SS)</p>
        <a href="https://www.instagram.com/yardsangavino/" class="insta-link" target="_blank">Instagram 📷</a>
        <p style="margin-top:15px; opacity: 0.5;">Designed by Matteo Masia</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://germswzsfsxxlawqxsgt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa';
        
        // CORREZIONE FONDAMENTALE: Usiamo 'sb' invece di 'supabase' per evitare conflitti di nome
        // con l'oggetto globale supabase iniettato dallo script CDN.
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Dati grezzi (italiano, fonte di verità) e stato lingua corrente
        let cats = [];
        let prods = [];
        let currentLang = 'it';
        try { currentLang = localStorage.getItem('yard_lang') || 'it'; } catch (e) { /* storage non disponibile, va bene IT di default */ }
        let nameOverrides = { categories: {}, products: {} };

        const LANGS = [
            { code: 'it', label: 'IT' },
            { code: 'en', label: 'EN' },
            { code: 'es', label: 'ES' },
            { code: 'fr', label: 'FR' },
            { code: 'de', label: 'DE' }
        ];

        async function loadMenu() {
            const container = document.getElementById('menu-container');
            const loader = document.getElementById('loader-wrapper');
            const loaderText = document.getElementById('loader-text');
            
            try {
                console.log("Inizio fetching dati da Supabase...");
                loaderText.textContent = "Caricamento categorie...";

                // Leggiamo solo categorie visibili ordinate
                const { data: catData, error: catErr } = await sb
                    .from('categories')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (catErr) {
                    console.error("Errore Categorie:", catErr);
                    throw new Error("Errore Categorie: " + catErr.message);
                }

                loaderText.textContent = "Caricamento prodotti...";

                // Leggiamo solo prodotti visibili ordinati per order_index
                const { data: prodData, error: prodErr } = await sb
                    .from('products')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (prodErr) {
                    console.error("Errore Prodotti:", prodErr);
                    throw new Error("Errore Prodotti: " + prodErr.message);
                }

                cats = catData || [];
                prods = prodData || [];

                // Nascondiamo il loader
                loader.style.display = 'none';

                renderLangSwitcher();

                if (currentLang !== 'it') {
                    // L'utente aveva già scelto una lingua in una visita precedente
                    await applyLanguage(currentLang);
                } else {
                    renderMenu();
                }

            } catch (error) {
                console.error("Errore fatale in loadMenu:", error);
                if (loader) loader.style.display = 'none';
                // Mostra un errore rosso in pagina invece di restare bloccato sul loader
                container.innerHTML = `
                    <div class="error-msg">
                        <strong>Ops! Impossibile caricare il menù.</strong><br>
                        <small style="opacity:0.8; display:block; margin-top:10px;">${error.message}</small>
                    </div>`;
            }
        }

        // Disegna il menù usando i dati grezzi + eventuali traduzioni correnti.
        // La struttura (ordine, raggruppamento per categoria) viene sempre
        // dai dati italiani: la lingua sostituisce solo i nomi visualizzati.
        function renderMenu() {
            const container = document.getElementById('menu-container');

            if (!cats || cats.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.7; padding: 20px;">Nessuna categoria visibile al momento.</p>';
                return;
            }

            let menuHTML = '';

            cats.forEach(cat => {
                const catProducts = prods ? prods.filter(p => p.category_id === cat.id) : [];
                if (catProducts.length === 0) return;

                const catName = currentLang !== 'it' && nameOverrides.categories[cat.id]
                    ? nameOverrides.categories[cat.id]
                    : cat.name;

                let itemsHTML = catProducts.map(p => {
                    const prodName = currentLang !== 'it' && nameOverrides.products[p.id]
                        ? nameOverrides.products[p.id]
                        : p.name;
                    return `
                        <div class="row">
                            <span>${prodName}</span>
                            <span class="price">€${parseFloat(p.price).toFixed(2)}</span>
                        </div>
                    `;
                }).join('');

                menuHTML += `
                    <div class="category">
                        <div class="cat-header" onclick="toggleCategory(this)">
                            ${catName.toUpperCase()} <span class="arrow">▼</span>
                        </div>
                        <div class="items">
                            ${itemsHTML}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = menuHTML || '<p style="text-align:center; opacity:0.7;">Nessun prodotto visibile al momento.</p>';
        }

        function renderLangSwitcher() {
            const el = document.getElementById('lang-switcher');
            if (!el) return;
            el.innerHTML = LANGS.map(l =>
                `<button class="lang-btn ${l.code === currentLang ? 'active' : ''}" onclick="setLanguage('${l.code}')">${l.label}</button>`
            ).join('');
        }

        function showLangNotice(message) {
            const el = document.getElementById('lang-notice');
            if (!el) return;
            if (!message) { el.style.display = 'none'; el.textContent = ''; return; }
            el.textContent = message;
            el.style.display = 'block';
        }

        // Applica una lingua: per IT è istantaneo (nessuna chiamata di rete).
        // Per le altre lingue interroga /api/translate-menu, che a sua volta
        // legge dalla cache su Supabase e chiama Gemini solo per le voci
        // mancanti. In caso di errore, fallback automatico sull'italiano.
        async function applyLanguage(lang) {
            if (lang === 'it') {
                currentLang = 'it';
                nameOverrides = { categories: {}, products: {} };
                renderLangSwitcher();
                renderMenu();
                showLangNotice(null);
                return;
            }

            const switcherEl = document.getElementById('lang-switcher');
            if (switcherEl) switcherEl.classList.add('loading');

            try {
                const res = await fetch(`/api/translate-menu?lang=${lang}`);
                if (!res.ok) throw new Error('Servizio di traduzione non disponibile (' + res.status + ')');
                const data = await res.json();

                currentLang = lang;
                nameOverrides = { categories: data.categories || {}, products: data.products || {} };
                renderLangSwitcher();
                renderMenu();
                showLangNotice(data.partial ? 'Alcune voci non sono ancora tradotte: verranno aggiornate a breve.' : null);
            } catch (err) {
                console.error('Errore traduzione:', err);
                currentLang = 'it';
                nameOverrides = { categories: {}, products: {} };
                renderLangSwitcher();
                renderMenu();
                showLangNotice('Traduzione non disponibile al momento: mostro il menù in italiano.');
            } finally {
                if (switcherEl) switcherEl.classList.remove('loading');
            }
        }

        window.setLanguage = function(lang) {
            if (lang === currentLang) return;
            try { localStorage.setItem('yard_lang', lang); } catch (e) { /* storage non disponibile, non blocca la UX */ }
            applyLanguage(lang);
        };

        window.toggleCategory = function(element) {
            const itemsContainer = element.nextElementSibling;
            const isActive = itemsContainer.classList.contains('active');
            const allCategories = Array.from(document.querySelectorAll('.category'));
            const clickedIndex = allCategories.indexOf(element.parentElement);

            // Durata della transizione, letta dalla variabile CSS per restare sempre sincronizzata
            const durationStr = getComputedStyle(document.documentElement).getPropertyValue('--collapse-duration').trim();
            const collapseDuration = parseFloat(durationStr) * 1000 || 350;

            let mustWaitForCloseAbove = false;

            // Chiude in modo animato tutte le altre categorie aperte
            document.querySelectorAll('.items.active').forEach(otherItems => {
                if (otherItems === itemsContainer) return;

                const otherCategoryDiv = otherItems.closest('.category');
                const otherIndex = allCategories.indexOf(otherCategoryDiv);
                if (otherIndex < clickedIndex) mustWaitForCloseAbove = true;

                // Fissa l'altezza attuale esplicitamente prima di animare verso 0
                otherItems.style.maxHeight = otherItems.scrollHeight + 'px';
                void otherItems.offsetHeight; // forza il reflow
                otherItems.style.maxHeight = '0px';
                otherItems.classList.remove('active');

                const otherArrow = otherCategoryDiv.querySelector('.arrow');
                if (otherArrow) otherArrow.textContent = '▼';
            });

            if (isActive) {
                // L'utente ha chiuso la categoria che era aperta: nessuno scroll
                itemsContainer.style.maxHeight = '0px';
                itemsContainer.classList.remove('active');
                element.querySelector('.arrow').textContent = '▼';
                return;
            }

            // Apre la categoria cliccata
            itemsContainer.classList.add('active');
            itemsContainer.style.maxHeight = itemsContainer.scrollHeight + 'px';
            element.querySelector('.arrow').textContent = '▲';

            const scrollHeaderIntoView = () => {
                const headerTop = element.getBoundingClientRect().top + window.scrollY;
                window.scrollTo({ top: headerTop, behavior: 'smooth' });
            };

            if (mustWaitForCloseAbove) {
                // Aspetta che la chiusura delle categorie sopra finisca, altrimenti
                // la posizione dell'header cambierebbe mentre lo scroll è già in corso
                setTimeout(scrollHeaderIntoView, collapseDuration);
            } else {
                requestAnimationFrame(scrollHeaderIntoView);
            }
        };

        // Avvia il caricamento appena lo script viene letto
        loadMenu();
    </script>
</body>
</html>
