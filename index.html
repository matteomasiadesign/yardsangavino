<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Yard | Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        .menu-item { border-bottom: 1px solid #333; padding: 10px 0; }
    </style>
</head>
<body>
    <h1>Menu</h1>
    <div id="menu-container">Caricamento menu...</div>

    <script>
        const sb = supabase.createClient('https://germswzsfsxxlawqxsgt.supabase.co', 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa');

        async function loadMenu() {
            const { data, error } = await sb.from('prodotti').select('*');
            if (error) {
                document.getElementById('menu-container').innerHTML = "Errore caricamento menu.";
            } else {
                document.getElementById('menu-container').innerHTML = data.map(item => 
                    `<div class="menu-item">${item.nome} - €${item.prezzo}</div>`
                ).join('');
            }
        }
        loadMenu();
    </script>
</body>
</html>
