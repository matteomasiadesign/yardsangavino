<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yard | Menù</title>
    <!-- Import Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #39FF14;
            --text: #ffffff;
            --glow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        header { margin: 40px 0; text-align: center; }
        
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        .logo-img {
            max-width: 180px;
            max-height: 80px;
            object-fit: contain;
        }

        h1 { 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 900; 
            font-size: 2.5rem; 
            letter-spacing: 4px; 
            color: var(--text); 
            margin: 10px 0; 
            text-shadow: var(--glow); 
        }

        .menu-wrapper { width: 100%; max-width: 500px; flex-grow: 1; }
        
        .category { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            margin-bottom: 15px; 
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .cat-header { 
            padding: 20px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 600; 
            color: var(--accent); 
            transition: background 0.3s;
        }
        
        .cat-header:hover { background: rgba(57, 255, 20, 0.03); }

        .items { 
            padding: 0 20px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease, padding 0.4s ease;
        }
        
        .items.active { 
            padding: 0 20px 20px 20px;
            opacity: 1;
        }
        
        .row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            font-size: 0.95rem; 
            border-bottom: 1px dashed rgba(255,255,255,0.08); 
        }
        .row:last-child { border-bottom: none; }
        
        .price { font-weight: 500; color: #ddd; }

        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid var(--accent); 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 1s linear infinite; 
            margin: 30px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-msg { 
            color: #ff453a; 
            text-align: center; 
            padding: 20px; 
            background: rgba(255,69,58,0.08); 
            border-radius: 16px; 
            border: 1px solid rgba(255,69,58,0.2); 
            margin-top: 20px;
        }

        footer { 
            margin-top: auto; 
            padding-top: 50px;
            padding-bottom: 20px;
            text-align: center; 
            font-size: 0.8rem; 
            color: #86868b; 
            width: 100%;
        }
        .insta-link { color: var(--accent); text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.webp" class="logo-img" alt="YARD Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<h1>MENÙ</h1>';">
        </div>
    </header>

    <div class="menu-wrapper" id="menu-container">
        <!-- Loader iniziale -->
        <div id="loader-wrapper">
            <div class="loader"></div>
            <p style="text-align:center; color: var(--text); opacity: 0.7; font-size: 14px;" id="loader-text">Caricamento menù...</p>
        </div>
    </div>

    <footer>
        <p>YARD | Chiosco del parco</p>
        <p>Parco di San Gavino, Porto Torres (SS)</p>
        <a href="https://www.instagram.com/yardsangavino/" class="insta-link" target="_blank">Instagram 📷</a>
        <p style="margin-top:15px; opacity: 0.5;">Designed by Matteo Masia</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://germswzsfsxxlawqxsgt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa';
        
        // CORREZIONE FONDAMENTALE: Usiamo 'sb' invece di 'supabase' per evitare conflitti di nome
        // con l'oggetto globale supabase iniettato dallo script CDN.
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadMenu() {
            const container = document.getElementById('menu-container');
            const loader = document.getElementById('loader-wrapper');
            const loaderText = document.getElementById('loader-text');
            
            try {
                console.log("Inizio fetching dati da Supabase...");
                loaderText.textContent = "Caricamento categorie...";

                // Leggiamo solo categorie visibili ordinate
                const { data: cats, error: catErr } = await sb
                    .from('categories')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (catErr) {
                    console.error("Errore Categorie:", catErr);
                    throw new Error("Errore Categorie: " + catErr.message);
                }

                console.log("Categorie recuperate:", cats);
                loaderText.textContent = "Caricamento prodotti...";

                // Leggiamo solo prodotti visibili ordinati per order_index
                const { data: prods, error: prodErr } = await sb
                    .from('products')
                    .select('*')
                    .eq('is_visible', true)
                    .order('order_index');

                if (prodErr) {
                    console.error("Errore Prodotti:", prodErr);
                    throw new Error("Errore Prodotti: " + prodErr.message);
                }

                console.log("Prodotti recuperati:", prods);

                // Nascondiamo il loader
                loader.style.display = 'none';

                if (!cats || cats.length === 0) {
                    container.innerHTML = '<p style="text-align:center; opacity:0.7; padding: 20px;">Nessuna categoria visibile al momento.</p>';
                    return;
                }

                let menuHTML = '';

                cats.forEach(cat => {
                    const catProducts = prods ? prods.filter(p => p.category_id === cat.id) : [];
                    
                    // Mostriamo la categoria solo se ha almeno un prodotto visibile
                    if (catProducts.length === 0) return;

                    let itemsHTML = catProducts.map(p => `
                        <div class="row">
                            <span>${p.name}</span>
                            <span class="price">€${parseFloat(p.price).toFixed(2)}</span>
                        </div>
                    `).join('');

                    menuHTML += `
                        <div class="category">
                            <div class="cat-header" onclick="toggleCategory(this)">
                                ${cat.name.toUpperCase()} <span class="arrow">▼</span>
                            </div>
                            <div class="items">
                                ${itemsHTML}
                            </div>
                        </div>
                    `;
                });

                if(menuHTML === '') {
                     container.innerHTML = '<p style="text-align:center; opacity:0.7;">Nessun prodotto visibile al momento.</p>';
                } else {
                     container.innerHTML = menuHTML;
                }

            } catch (error) {
                console.error("Errore fatale in loadMenu:", error);
                if (loader) loader.style.display = 'none';
                // Mostra un errore rosso in pagina invece di restare bloccato sul loader
                container.innerHTML = `
                    <div class="error-msg">
                        <strong>Ops! Impossibile caricare il menù.</strong><br>
                        <small style="opacity:0.8; display:block; margin-top:10px;">${error.message}</small>
                    </div>`;
            }
        }

        window.toggleCategory = function(element) {
            const categoryDiv = element.parentElement;
            const itemsContainer = element.nextElementSibling;
            const arrow = element.querySelector('.arrow');
            const isActive = itemsContainer.classList.contains('active');

            // Chiude tutte le altre categorie aperte
            document.querySelectorAll('.items').forEach(item => {
                if (item !== itemsContainer) {
                    item.classList.remove('active');
                    item.style.maxHeight = null;
                    const otherArrow = item.previousElementSibling.querySelector('.arrow');
                    if (otherArrow) otherArrow.textContent = '▼';
                }
            });

            // Attiva o disattiva la tendina cliccata
            if (isActive) {
                itemsContainer.classList.remove('active');
                itemsContainer.style.maxHeight = null;
                arrow.textContent = '▼';
            } else {
                itemsContainer.classList.add('active');
                // Sfrutta scrollHeight per calcolare dinamicamente l'altezza esatta
                itemsContainer.style.maxHeight = itemsContainer.scrollHeight + 40 + "px";
                arrow.textContent = '▲';
                
                // Spostamento fluido per non nascondere l'intestazione
                setTimeout(() => {
                    const offset = 40; 
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = categoryDiv.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }, 200);
            }
        };

        // Avvia il caricamento appena lo script viene letto
        loadMenu();
    </script>
</body>
</html>
