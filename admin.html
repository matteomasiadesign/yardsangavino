<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Yard | Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: rgba(20, 24, 20, 0.8); --accent: #30d158; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #222; border-radius: 8px; }
        .tab-btn.active { background: var(--accent); color: black; }
        .panel { display: none; background: var(--card); padding: 20px; border-radius: 12px; }
        .panel.active { display: block; }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; cursor: grab; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab-btn active" onclick="showPanel('add')">Aggiungi</div>
        <div class="tab-btn" onclick="showPanel('reorder')">Riordina</div>
        <div class="tab-btn" onclick="showPanel('manage')">Gestisci</div>
    </div>

    <div id="add" class="panel active">
        <input type="text" id="name" placeholder="Nome">
        <input type="number" id="price" placeholder="Prezzo">
        <input type="text" id="category" placeholder="Categoria">
        <button onclick="addProduct()">Salva Piatto</button>
    </div>

    <div id="reorder" class="panel">
        <div id="drag-list"></div>
    </div>

    <div id="manage" class="panel">
        <div id="manage-list"></div>
    </div>

<script>
    const sb = supabase.createClient('URL', 'KEY');

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    async function addProduct() {
        const { error } = await sb.from('prodotti').insert({
            nome: document.getElementById('name').value,
            prezzo: document.getElementById('price').value,
            categoria: document.getElementById('category').value
        });
        if(!error) alert("Aggiunto!");
    }

    // Drag and Drop (Logica semplificata)
    async function loadDragList() {
        const { data } = await sb.from('prodotti').select('*').order('posizione');
        const list = document.getElementById('drag-list');
        list.innerHTML = data.map(p => `<div class="list-item" draggable="true" ondragstart="drag(event)" id="${p.id}">${p.nome}</div>`).join('');
    }

    // Integra qui le logiche di Update e Delete usando sb.from('prodotti').update().eq('id', id)
</script>
</body>
</html>
