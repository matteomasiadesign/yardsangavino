<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Yard | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 40px; }
        .card { background: #141414; padding: 30px; border-radius: 16px; border: 1px solid #2d2d2d; max-width: 600px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1c1c1e; color: white; }
        button { background: #30d158; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app" class="card">Caricamento...</div>

    <script>
        const sb = supabase.createClient('https://germswzsfsxxlawqxsgt.supabase.co', 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa');

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                document.getElementById('app').innerHTML = `
                    <h2>Login Admin</h2>
                    <input type="password" id="pass" placeholder="Password">
                    <button onclick="login()">ACCEDI</button>
                `;
            } else {
                renderDashboard();
            }
        }

        async function login() {
            const pass = document.getElementById('pass').value;
            const { error } = await sb.auth.signInWithPassword({ email: 'adminyard@yard.it', password: pass });
            if (error) alert(error.message); else location.reload();
        }

        async function renderDashboard() {
            document.getElementById('app').innerHTML = `<h2>Dashboard</h2><button onclick="sb.auth.signOut(); location.reload();">LOGOUT</button><div id="dati"></div>`;
            const { data, error } = await sb.from('prodotti').select('*');
            document.getElementById('dati').innerHTML = error ? error.message : JSON.stringify(data);
        }
        init();
    </script>
</body>
</html>
