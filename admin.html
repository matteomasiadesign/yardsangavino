<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Yard | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0a0a0a; color:white; font-family:sans-serif; text-align:center; padding-top:50px;">

    <div id="app">Verifica connessione in corso...</div>

    <script>
        // Inizializzazione
        const supabase = supabase.createClient('https://germswzsfsxxlawqxsgt.supabase.co', 'sb_publishable_xXjGt3cuynDUHnlq846e4Q_dk-xwcMa');

        async function init() {
            try {
                // Test minimo: proviamo a leggere la sessione
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    document.getElementById('app').innerHTML = `
                        <h2>Login Admin</h2>
                        <input type="email" id="email" placeholder="Email"><br><br>
                        <input type="password" id="password" placeholder="Password"><br><br>
                        <button onclick="login()">ACCEDI</button>
                    `;
                } else {
                    document.getElementById('app').innerHTML = "<h1>Benvenuto Admin</h1><button onclick='logout()'>Logout</button>";
                }
            } catch (err) {
                document.getElementById('app').innerHTML = "Errore critico: " + err.message;
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else location.reload();
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        init();
    </script>
</body>
</html>
